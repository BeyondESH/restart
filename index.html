<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>时空重置 · 重新选择</title>
    <style>
        body {
            margin: 0;
            padding: 0;
            height: 100vh;
            background: radial-gradient(circle at center, #0a0a2a 0%, #000000 100%);
            color: #00ffff;
            font-family: system-ui, -apple-system, "Segoe UI", Roboto, Helvetica, Arial, sans-serif;
            display: flex;
            align-items: center;
            justify-content: center;
            overflow: hidden;
            position: relative;
        }
        
        body::before {
            content: '';
            position: absolute;
            top: 0; left: 0; right: 0; bottom: 0;
            background: repeating-linear-gradient(to bottom, transparent 0px, rgba(0, 255, 255, 0.03) 1px, transparent 2px);
            pointer-events: none;
            animation: scan 4s linear infinite;
        }
        
        @keyframes scan {
            0% { background-position: 0 0; }
            100% { background-position: 0 100%; }
        }
        
        .container {
            text-align: center;
            z-index: 10;
            width: 100%;
            max-width: 700px;
            padding: 20px;
        }
        
        h1 {
            font-size: 4rem;
            margin-bottom: 3rem;
            text-shadow: 0 0 20px #00ffff;
            letter-spacing: 0.15em;
            animation: glow 2s ease-in-out infinite alternate;
        }
        
        @keyframes glow {
            from { text-shadow: 0 0 10px #00ffff; }
            to { text-shadow: 0 0 40px #00ffff; }
        }
        
        .card {
            background: rgba(10, 10, 42, 0.9);
            border: 2px solid #00ffff;
            border-radius: 20px;
            padding: 3.5rem 4rem;
            box-shadow: 0 0 40px rgba(0, 255, 255, 0.6);
            transition: all 0.6s ease;
            opacity: 1;
            visibility: visible;
        }
        
        .card.hidden {
            opacity: 0;
            visibility: hidden;
            transform: scale(0.95);
        }
        
        .question {
            font-size: 2.1rem;
            margin-bottom: 3rem;
        }
        
        .btn {
            padding: 18px 55px;
            font-size: 1.9rem;
            background: transparent;
            color: #00ffff;
            border: 3px solid #00ffff;
            border-radius: 50px;
            margin: 0 15px;
            cursor: pointer;
            transition: all 0.4s;
            box-shadow: 0 0 25px rgba(0, 255, 255, 0.5);
        }
        
        .btn:hover {
            background: #00ffff;
            color: #000;
            transform: translateY(-3px);
        }
        
        #loading-screen, #complete-screen {
            display: none;
            opacity: 0;
            transition: opacity 0.8s ease;
        }
        
        #loading-screen.active, #complete-screen.active {
            display: block;
            opacity: 1;
        }
        
        .loading-text {
            font-size: 2.4rem;
            margin: 2.5rem 0;
            animation: pulse 1.8s infinite;
        }
        
        .progress-bar {
            height: 22px;
            background: #112233;
            border: 2px solid #00ffff;
            border-radius: 9999px;
            overflow: hidden;
            margin: 2.5rem 0;
        }
        
        .progress {
            height: 100%;
            width: 0;
            background: linear-gradient(90deg, #00ffff, #00ccff);
            animation: loading-progress 8s linear forwards;
        }
        
        @keyframes pulse { 0%, 100% { opacity: 1; } 50% { opacity: 0.3; } }
        @keyframes loading-progress { to { width: 100%; } }
        
        .shake {
            animation: shake 0.5s;
        }
        
        @keyframes shake {
            0%, 100% { transform: translateX(0); }
            10%, 30%, 50%, 70%, 90% { transform: translateX(-6px); }
            20%, 40%, 60%, 80% { transform: translateX(6px); }
        }
    </style>
</head>
<body>
    <div class="container">
        <h1>时空重置 · 重新选择</h1>
        
        <!-- 问题界面（初始只显示这个） -->
        <div id="question-screen" class="card">
            <div class="question">是否选择重置？</div>
            <button class="btn" onclick="chooseYes()">是</button>
            <button class="btn" onclick="chooseNo()">否</button>
        </div>
        
        <!-- 正在重置界面 -->
        <div id="loading-screen">
            <div class="card">
                <div class="loading-text">正在重置中<span id="dots">...</span></div>
                <div class="progress-bar">
                    <div class="progress"></div>
                </div>
                <p style="margin-top: 2rem; opacity: 0.8;">时间线重构中...<br>请勿关闭</p>
            </div>
        </div>
        
        <!-- 重置完成界面 -->
        <div id="complete-screen">
            <div class="card" style="border-color: #00ffaa; color: #00ffaa;">
                <h2 style="font-size: 3.2rem; margin: 1rem 0; color: #00ffaa;">重置完成</h2>
                <p style="font-size: 1.8rem;">新时间线已载入</p>
                <button class="btn" onclick="restart()" style="margin-top: 2rem;">重新开始</button>
            </div>
        </div>
    </div>

    <script>
        function chooseYes() {
            const questionScreen = document.getElementById('question-screen');
            const loadingScreen = document.getElementById('loading-screen');
            
            // 问题界面先淡出
            questionScreen.classList.add('hidden');
            
            setTimeout(() => {
                questionScreen.style.display = 'none';
                loadingScreen.style.display = 'block';
                
                // loading 淡入
                setTimeout(() => {
                    loadingScreen.classList.add('active');
                    
                    // 动态点点
                    let dots = document.getElementById('dots');
                    let count = 3;
                    const interval = setInterval(() => {
                        count = (count % 6) + 3;
                        dots.textContent = '.'.repeat(count);
                    }, 350);
                    
                    // 8秒后切换到完成
                    setTimeout(() => {
                        clearInterval(interval);
                        loadingScreen.classList.remove('active');
                        setTimeout(() => {
                            loadingScreen.style.display = 'none';
                            const completeScreen = document.getElementById('complete-screen');
                            completeScreen.style.display = 'block';
                            setTimeout(() => completeScreen.classList.add('active'), 50);
                        }, 600);
                    }, 8000);
                }, 100);
            }, 600);
        }
        
        function chooseNo() {
            const card = document.getElementById('question-screen');
            card.classList.add('shake');
            setTimeout(() => card.classList.remove('shake'), 600);
            alert('⏳ 时间线保持稳定，未进行重置。');
        }
        
        function restart() {
            location.reload();
        }
        
        // Esc 键快速回到初始页面（拍摄超方便）
        document.addEventListener('keydown', (e) => {
            if (e.key === "Escape") location.reload();
        });
    </script>
</body>
</html>
